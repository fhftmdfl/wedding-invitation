name: Deploy React to GitHub Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Detect build folder
        run: |
          if [ -d "dist" ]; then echo "FOLDER=dist" >> $GITHUB_ENV; exit 0; fi
          if [ -d "build" ]; then echo "FOLDER=build" >> $GITHUB_ENV; exit 0; fi
          if [ -d "out" ]; then echo "FOLDER=out" >> $GITHUB_ENV; exit 0; fi
          echo "No build folder found (dist/build/out). Check your build output." && exit 1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.FOLDER }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
